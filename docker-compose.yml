services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dijkdoorbraak
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GITHUB_OWNER}/dijkdoorbraak-backend:latest
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/dijkdoorbraak
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_TOKEN_SECRET: ${ADMIN_TOKEN_SECRET}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GITHUB_OWNER}/dijkdoorbraak-frontend:latest
    ports:
      - "3002:3002"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
